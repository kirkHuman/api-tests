name: CI and Smart Reporter Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Run Playwright tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Create smart-report directory
        run: mkdir -p smart-report

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests (generate smart report)
        run: npx playwright test

      - name: Upload Smart Reporter artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: smart-report

  deploy:
    name: Deploy Smart Reporter to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

